<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>{% block title %}StegoCrypt{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script>
/* Aplica el tema guardado ANTES de pintar la página, para que no haya
   parpadeo de tema equivocado al navegar entre secciones. */
(function () {
  var t = localStorage.getItem('sc-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
})();
</script>
</head>
<body>

<header class="header">
  <a class="brand" href="{{ url_for('start') }}">
    <span class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="11" width="16" height="9" rx="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
    </span>
    <span class="brand-text">
      <span class="brand-name">StegoCrypt</span>
      <span class="brand-by">by kevxngg</span>
    </span>
  </a>
  <button class="icon-btn" onclick="toggleTheme()" title="Cambiar tema" aria-label="Cambiar tema">
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="4"></circle>
      <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
    </svg>
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
  </button>
</header>

<div class="main">
  {% with messages = get_flashed_messages() %}
    {% if messages %}
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        {% for m in messages %}showToast({{ m|tojson }}, 'error');{% endfor %}
      });
    </script>
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<div class="toast-area" id="toast-area"></div>

<div class="spinner-overlay" id="spinner">
  <div class="spinner"></div>
  <div class="spinner-msg" id="spinner-msg">Procesando...</div>
</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
